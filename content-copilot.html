<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighthouse Content Copilot</title>
    <link rel="stylesheet" href="css/styles-v3.css">
    <link rel="stylesheet" href="css/ai-features.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="logo logo-link">
            <img src="asset/lhp_logo1.png" alt="Lighthouse Parish Logo" class="logo-icon-img">
        </a>
        <nav class="main-nav">
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="watchlive.html">WATCH LIVE</a></li>
                <li><a href="give.html" class="btn-give">GIVE</a></li>
            </ul>
        </nav>
    </header>

    <section class="ai-content-wrapper">
        <h1 class="section-title">Weekly Bulletin AI Copilot</h1>
        <p>Create first-draft bulletin, social post, and email intro from sermon notes.</p>
        <form id="ai-content-copilot-form">
            <div class="form-group">
                <label for="copilot-sermon">Sermon Title</label>
                <input id="copilot-sermon" type="text" required>
            </div>
            <div class="form-group">
                <label for="copilot-scripture">Key Scripture</label>
                <input id="copilot-scripture" type="text" required>
            </div>
            <div class="form-group">
                <label for="copilot-audience">Audience</label>
                <select id="copilot-audience">
                    <option value="Church Family">Church Family</option>
                    <option value="First-time Guests">First-time Guests</option>
                    <option value="Volunteers">Volunteers</option>
                </select>
            </div>
            <button class="btn-submit" type="submit">Generate Drafts</button>
        </form>
        <div id="ai-content-output" class="ai-content-output"></div>
    </section>

    <script src="js/app.js"></script>
    <script src="js/ai-features.js"></script>
</body>
</html>
